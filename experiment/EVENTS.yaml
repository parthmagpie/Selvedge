# EVENTS.yaml — Analytics Event Dictionary
#
# Events for Selvedge — Premium Deadstock Textile Marketplace
# Generated from experiment.yaml golden_path and behaviors.

global_properties:
  project_name:
    description: From experiment.yaml `name` field. Identifies which experiment this data belongs to.
    type: string
    required: true
  project_owner:
    description: From experiment.yaml `owner` field. Identifies who owns this experiment.
    type: string
    required: true

events:
  # --- Reach Events ---
  visit_landing:
    funnel_stage: reach
    trigger: User loads the landing page

  # --- Demand Events ---
  cta_click:
    funnel_stage: demand
    trigger: User clicks primary CTA on landing page
    properties:
      cta_type:
        type: string
        required: true
        description: Which CTA was clicked (browse_fabrics, list_inventory)

  browse_started:
    funnel_stage: demand
    trigger: User loads the marketplace browse page
    properties:
      entry_point:
        type: string
        required: false
        description: How they arrived (landing_cta, direct, nav)

  view_listing:
    funnel_stage: demand
    trigger: User views a listing detail page
    properties:
      listing_id:
        type: string
        required: true
        description: ID of the fabric listing viewed
      material:
        type: string
        required: false
        description: Material type of the fabric

  # --- Activate Events ---
  filter_applied:
    funnel_stage: activate
    trigger: User applies a filter on the browse page
    properties:
      filter_type:
        type: string
        required: true
        description: Type of filter (material, color, price, yardage)
      filter_value:
        type: string
        required: true
        description: Value selected

  fabric_saved:
    funnel_stage: activate
    trigger: User saves a fabric to favorites
    properties:
      listing_id:
        type: string
        required: true
        description: ID of the saved listing

  add_to_cart:
    funnel_stage: activate
    trigger: User adds yardage to cart from listing detail
    properties:
      listing_id:
        type: string
        required: true
        description: ID of the listing
      yards:
        type: number
        required: true
        description: Number of yards added
      price_per_yard:
        type: number
        required: true
        description: Price per yard in dollars

  upload_started:
    funnel_stage: activate
    trigger: Factory worker starts the upload flow
    properties:
      source:
        type: string
        required: true
        description: How they started (file_upload, sample_selection)

  listing_published:
    funnel_stage: activate
    trigger: Factory worker publishes a new listing
    properties:
      material:
        type: string
        required: true
        description: Detected material type
      color:
        type: string
        required: true
        description: Detected color family
      yards:
        type: number
        required: true
        description: Estimated yardage
      price:
        type: number
        required: true
        description: Price per yard set
      ai_confidence:
        type: number
        required: true
        description: AI confidence percentage
