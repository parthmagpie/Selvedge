# experiment.yaml — Selvedge: Premium Deadstock Textile Marketplace
#
# Filled in from Claude Design handoff bundle (Campaign direction).
# Design spec: /tmp/mvp4/project/Selvedge Build Spec.html

# --- 1. Identity ---
name: selvedge
owner: parth
type: web-app
level: 2                       # Prototype: landing + functional marketplace + upload flow
status: draft

# --- 2. Intent ---
description: |
  High-end fashion manufacturing facilities dump billions of tons of high-quality,
  pristine leftover fabric (deadstock) into landfills because large brands have no
  use for small, irregular yardages. Selvedge is a marketplace that lets garment
  factories list their premium leftover textile scraps for sale to indie designers,
  students, and boutique upcycling brands.

  The unique edge: a factory worker photographs a fabric roll, and computer vision
  estimates material type, texture, color family, and approximate yardage — generating
  an instant product listing with zero data entry.

thesis: "If factories can list deadstock fabric in under 60 seconds via AI photo upload, then 10+ factories will list at least 5 rolls within the first month, as measured by published listings"
target_user: "Sustainable fashion brands, indie designers, design students, and textile factories looking to monetize surplus inventory"

distribution: |
  - Post in sustainable fashion subreddits (r/sustainablefashion, r/sewing)
  - LinkedIn outreach to textile factory sustainability managers
  - Partner with fashion design schools for student pilot
  - Indie Hackers and Product Hunt for initial traction

hypotheses:
  - id: h-01
    category: demand
    statement: ">5% of designers who visit the landing page click 'Browse fabrics'"
    metric:
      formula: "cta_click / visit_landing"
      threshold: 0.05
      operator: gte
    priority_score: 90
    experiment_level: 1
    depends_on: []
    status: pending
  - id: h-02
    category: activate
    statement: ">30% of visitors who browse will save at least one fabric to favorites"
    metric:
      formula: "fabric_saved / browse_started"
      threshold: 0.30
      operator: gte
    priority_score: 80
    experiment_level: 2
    depends_on: [h-01]
    status: pending
  - id: h-03
    category: activate
    statement: "Factory workers can create a listing in under 60 seconds using the AI upload flow"
    metric:
      formula: "listing_published / upload_started"
      threshold: 0.50
      operator: gte
    priority_score: 85
    experiment_level: 2
    depends_on: []
    status: pending
  - id: h-04
    category: demand
    statement: ">10% of designers who view a listing detail page will add yardage to cart"
    metric:
      formula: "add_to_cart / view_listing"
      threshold: 0.10
      operator: gte
    priority_score: 75
    experiment_level: 2
    depends_on: [h-02]
    status: pending

# --- 3. Behaviors ---
behaviors:
  - id: b-01
    hypothesis_id: h-01
    pages: [landing]
    given: "A designer or factory worker visits the Selvedge landing page"
    when: "They read the value proposition and see the fabric collage"
    then: "They click 'Browse fabrics' or 'List your inventory' CTA"
    tests:
      - "Landing page renders hero with fabric tiles and AI spec card"
      - "CTA buttons are visible and clickable"
      - "Mill marquee scrolls with factory names"
    level: 1
  - id: b-02
    hypothesis_id: h-02
    pages: [browse]
    given: "A designer clicks 'Browse fabrics' from landing"
    when: "They filter by material, color family, price, and yardage"
    then: "They see a filtered grid of listing cards and can save favorites"
    tests:
      - "Filter panel shows material checkboxes with counts"
      - "Color family swatch chips toggle filter state"
      - "Price and yardage sliders update results in real-time"
      - "Favorites persist to localStorage"
    level: 2
  - id: b-03
    hypothesis_id: h-04
    pages: [listing]
    given: "A designer clicks on a listing card"
    when: "They view the gallery, AI spec sheet, and buy panel"
    then: "They can select yardage and click 'Add to order'"
    tests:
      - "Gallery shows 4 zoom levels of the fabric texture"
      - "AI spec sheet displays material, composition, weave, color, weight, width"
      - "Yardage stepper clamps to available stock"
      - "Add button shows live price calculation"
    level: 2
  - id: b-04
    hypothesis_id: h-03
    pages: [upload]
    given: "A factory worker visits the upload page"
    when: "They photograph a fabric roll (or select a sample)"
    then: "AI analyzes the image and auto-fills a draft listing in <10 seconds"
    tests:
      - "Drop zone accepts image upload or sample selection"
      - "Analysis animation shows progress through 5 phases"
      - "Review form pre-fills title, material, texture, color, yardage, width, weight, price"
      - "Each field shows 'AI' badge indicating auto-detection"
    level: 2
  - id: b-05
    hypothesis_id: h-03
    pages: [upload]
    given: "AI has drafted a listing with pre-filled fields"
    when: "The factory worker reviews, optionally edits, and clicks 'Publish'"
    then: "The listing goes live with a success confirmation and payout estimate"
    tests:
      - "Confidence meter shows AI confidence percentage"
      - "Payout calculator shows 90% of (price x yards)"
      - "Published state shows the listing card with 'Live now' badge"
      - "CTAs offer 'List another roll' and 'See it in marketplace'"
    level: 2

# --- 4. Journey ---
golden_path:
  - step: "Visit landing page"
    event: visit_landing
    page: landing
  - step: "Click 'Browse fabrics' CTA"
    event: cta_click
    page: landing
  - step: "Browse marketplace with filters"
    event: browse_started
    page: browse
  - step: "Click on a listing card"
    event: view_listing
    page: browse
  - step: "Add yardage to cart"
    event: add_to_cart
    page: listing
target_clicks: 4

# --- 5. Variants (omitted for single-variant MVP) ---
# Using Campaign direction from Claude Design. See experiment/design-reference/
# Core messaging:
#   - Headline: "RESCUE THE cloth NOBODY COULD USE."
#   - Tagline: "Premium deadstock, by the yard"
#   - CTA: "Browse fabrics" / "List your inventory"

# --- 6. Funnel ---
funnel:
  available_from:
    reach: L1
    demand: L1
    activate: L2
    monetize: L3
    retain: L3
  decision_framework:
    scale: "All tested dimensions >= 1.0"
    kill: "Any top-funnel (REACH or DEMAND) < 0.5"
    pivot: "2+ dimensions < 0.8"
    refine: "1+ dimensions < 1.0 but fewer than 2 below 0.8"

# --- 7. Stack + Deploy ---
stack:
  services:
    - name: app
      runtime: nextjs
      hosting: vercel
      ui: shadcn
      testing: playwright
  database: supabase
  auth: supabase
  analytics: posthog
  # payment: stripe            # Payment in Level 3

# --- Target Geography ---
target_geo: [US, GB, DE, FR, IT, JP]   # Fashion/textile markets

deploy:
  url: null
  repo: null
  domain: null
