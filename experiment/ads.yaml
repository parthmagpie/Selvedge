# Selvedge Google Ads Campaign Configuration
# Generated by /distribute for Phase 1 screening

channel: google-ads
campaign_name: selvedge-search-v1
project_name: selvedge
landing_url: https://selvedge.draftlabs.org

# Phase 1 Playbook (auto-injected, do not modify)
playbook:
  phase: 1
  bidding_strategy: manual_cpc
  match_type: phrase
  network: search_only
  ad_schedule: "24/7"
  geo: [US, GB, DE, FR, IT, JP]
  rsa_count: 2
  ad_group_count: 1
  negative_keywords:
    - free
    - how to
    - what is
    - tutorial
    - guide
    - example
    - template
    - sample
    - course
    - training
    - certification
    - degree
    - salary
    - job
    - jobs
    - career
    - careers
    - hiring
    - intern
    - internship
    - enterprise
    - corporate
    - fortune 500
    - government
    - federal
    - download
    - open source
    - github
    - stackoverflow
    - reddit
    - review
    - reviews
    - comparison
    - vs
    - versus
    - alternative
    - alternatives
    - cheap
    - cheapest
    - discount
    - coupon
    - promo
    - scam
    - complaint
    - lawsuit
    - wiki
    - wikipedia
    - definition
    - meaning
    - pdf

keywords:
  exact:
    - "[deadstock fabric]"
    - "[surplus textile]"
    - "[fabric remnants]"
    - "[sustainable fabric supplier]"
    - "[designer fabric wholesale]"
  phrase:
    - "\"deadstock fabric wholesale\""
    - "\"buy surplus fabric\""
    - "\"sustainable fashion fabric\""
  broad:
    - deadstock textile marketplace
    - eco friendly fabric supplier
  negative:
    - fast fashion
    - fabric store near me
    - joann fabrics
    - walmart fabric
    - hobby lobby

ads:
  - headlines:
      - "Selvedge"
      - "Rescue Premium Deadstock"
      - "Sustainable Fabric Marketplace"
      - "Premium Mill Surplus Fabrics"
      - "AI-Powered Fabric Listings"
      - "From Top Mills Worldwide"
      - "Shop Deadstock by the Yard"
      - "Designer Fabrics 40-70% Off"
    descriptions:
      - "Premium deadstock textiles from top factories. Japanese denim, Italian wool, French silk. Browse by material, color, yardage."
      - "Factories list surplus in 60 seconds with AI. Indie designers shop premium fabrics at wholesale prices. Sustainable fashion starts here."
      - "High-end fabric remnants that would otherwise go to landfill. Support sustainable fashion. Shop the marketplace today."
      - "Connect directly with textile mills. No middlemen. Premium quality at surplus prices. Free shipping on orders over $200."

sitelinks:
  - link_text: "Browse Fabrics"
    description_1: "Shop by material and color"
    description_2: "Japanese denim to Italian silk"
    final_url: "https://selvedge.draftlabs.org/browse?utm_source=google&utm_medium=cpc&utm_campaign=selvedge-search-v1&utm_content=sitelink_browse"
  - link_text: "List Your Inventory"
    description_1: "AI creates listings in 60 sec"
    description_2: "For textile factories"
    final_url: "https://selvedge.draftlabs.org/upload?utm_source=google&utm_medium=cpc&utm_campaign=selvedge-search-v1&utm_content=sitelink_upload"
  - link_text: "Sign Up Free"
    description_1: "Join sustainable designers"
    description_2: "Get early access to new rolls"
    final_url: "https://selvedge.draftlabs.org/signup?utm_source=google&utm_medium=cpc&utm_campaign=selvedge-search-v1&utm_content=sitelink_signup"

budget:
  daily_budget_cents: 2000
  total_budget_cents: 14000
  duration_days: 7
  bidding_strategy: manual_cpc

targeting:
  locations: [US, GB, DE, FR, IT, JP]
  languages: [en]

conversions:
  primary_action: signup_completed
  secondary_actions: [add_to_cart, purchase_completed]
  import_method: posthog_webhook  # Phase 3 only

guardrails:
  max_cpc_cents: 150
  min_daily_clicks: 3
  auto_pause_rules:
    - "CTR < 1% after 500 impressions"
    - "0 signups after 50% budget spent"

thresholds:
  # Budget: $140 over 7 days
  # Estimated CPC for sustainable fashion keywords: ~$1.20-$1.50
  # Expected clicks: $140 / $1.35 avg = ~103 clicks
  # Landing-to-signup rate: 8% (cold paid traffic, niche product)
  # Expected signups: 103 * 0.08 = ~8 signups
  # Signup-to-activation rate: 35% (activation = browse or save fabric)
  # Expected activations: 8 * 0.35 = ~3 activations
  expected_clicks: 103
  expected_signups: 8
  expected_activations: 3
  go_signal: "3+ activations (fabric saved or added to cart) from paid traffic within 7 days"
  no_go_signal: "0 activations after $70 spend (50% budget), or CTR < 1% after 500 impressions"
