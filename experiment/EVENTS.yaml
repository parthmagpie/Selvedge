# EVENTS.yaml — Analytics Event Dictionary
#
# This file is generated by /spec based on your experiment's behaviors,
# hypotheses, and golden_path. There are no standard/template events —
# every project defines its own events. funnel_stage is the only
# cross-MVP standardization layer.
#
# Rules:
#   1. Every event MUST have a funnel_stage: reach|demand|activate|monetize|retain
#   2. Naming: <object>_<action> in snake_case (e.g., invoice_created, landing_view)
#   3. Multiple events MAY share the same funnel_stage
#   4. Cross-MVP comparison aggregates by funnel_stage with distinct_id dedup
#   5. Run /spec to generate project-specific events
#
# Structure: flat map keyed by event name. Each event has:
#   funnel_stage: reach|demand|activate|monetize|retain
#   trigger: when this event fires
#   properties: (optional) typed property definitions
#   requires: (optional) stack dependencies, e.g. [payment]
#   archetypes: (optional) archetype-specific events, e.g. [service]

global_properties:
  project_name:
    description: From experiment.yaml `name` field. Identifies which experiment this data belongs to.
    type: string
    required: true
  project_owner:
    description: From experiment.yaml `owner` field. Identifies who owns this experiment.
    type: string
    required: true

# All properties marked required:true must be included in every track() call for that event.
# Properties marked required:false are optional — include them when the data is available.

events: {}
# /spec will populate this section with project-specific events.
# /change and /distribute can add events incrementally after bootstrap.
#
# Example (generated by /spec for an invoicing app):
#   landing_view:
#     funnel_stage: reach
#     trigger: User loads the landing page
#     properties:
#       variant:
#         type: string
#         required: false
#         description: Variant slug from experiment.yaml variants
#   invoice_created:
#     funnel_stage: activate
#     trigger: User creates a new invoice
#     properties:
#       currency:
#         type: string
#         required: true
#         description: Invoice currency code (e.g., USD, EUR)
