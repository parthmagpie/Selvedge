modes:
  default:
    states: ["0","1","2","3","4","99"]
  check:
    trigger: "--check"
    states: ["c0","c1","c2","c3","99"]
  cross:
    trigger: "--cross"
    states: ["x0","x0a","x0b","x1","x1a","x2","x3","x4","99"]
    # Cross mode is fleet-wide (data from PostHog); no local experiment to validate.
    skip_experiment_validation: true
  cross-phase2:
    trigger: "--cross --phase2"
    states: ["x5","99"]
    # Cross Phase 2 is fleet-wide and uses paid-click CSV + PostHog pay_intent data.
    skip_experiment_validation: true
