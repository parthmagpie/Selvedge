# ads.example.yaml — Worked example of a filled-in ads.yaml
# Generated by /distribute, reviewed by operator before launch.
# Copy structure to idea/ads.yaml and adjust for your experiment.

# --- Channel ---
# Which distribution channel this config targets.
# Available channels: google-ads, twitter, reddit
# Each channel has its own stack file at .claude/stacks/distribution/<channel>.md
channel: google-ads

# --- Campaign Identity ---
campaign_name: quickbill-search-v1  # auto: {idea.name}-search-v{N}
project_name: quickbill              # from experiment.yaml name
landing_url: https://quickbill.vercel.app  # deployed URL

# --- Keywords ---
# AI-researched from experiment.yaml problem/solution/target_user
keywords:
  exact:
    - "[freelance invoicing tool]"
    - "[simple invoice generator]"
    - "[send invoice online free]"
  phrase:
    - "\"invoice for freelancers\""
    - "\"get paid faster freelancer\""
  broad:
    - "freelancer billing software"
  negative:
    - "enterprise invoicing"
    - "accounting software"
    - "quickbooks alternative"

# --- Ad Copy ---
# Responsive search ad variations (minimum 2)
# Headlines: 3-30 chars each, 5+ per ad
# Descriptions: up to 90 chars each, 2 per ad
ads:
  - headlines:
      - "Invoice Clients in 60 Seconds"
      - "Free Freelance Invoicing"
      - "Get Paid Faster"
      - "No Accounting Degree Needed"
      - "Send Invoice, Get Paid"
    descriptions:
      - "Create and send professional invoices in under a minute. Free for freelancers billing 1-5 clients."
      - "Stop chasing payments. Send an invoice link, get notified when paid. Try it now."
  - headlines:
      - "Dead-Simple Invoicing"
      - "Built for Solo Freelancers"
      - "Create Invoice in 60s"
      - "Free Invoice Tool"
      - "Send & Get Paid"
    descriptions:
      - "No spreadsheets. No complexity. Create, send, get paid. Built for freelancers billing a few clients."
      - "Professional invoices without the learning curve. Sign up free and send your first invoice today."

# --- Sitelink Extensions ---
# Auto-generated from golden_path pages. Min 2, max 4 for Phase 1.
# When <2 qualifying pages exist, set sitelinks: []
# URL format: query params BEFORE fragment for anchor sitelinks
sitelinks:
  - link_text: "Create an Invoice"
    description_1: "Send invoices in under 60s"
    description_2: "No accounting degree needed"
    final_url: "https://quickbill.vercel.app/dashboard?utm_source=google&utm_medium=cpc&utm_campaign=quickbill-search-v1&utm_content=sitelink_dashboard"
  - link_text: "Sign Up Free"
    description_1: "Start sending invoices today"
    description_2: "Free for up to 5 clients"
    final_url: "https://quickbill.vercel.app/signup?utm_source=google&utm_medium=cpc&utm_campaign=quickbill-search-v1&utm_content=sitelink_signup"
  - link_text: "View Pricing"
    description_1: "Simple, transparent pricing"
    description_2: "No hidden fees"
    final_url: "https://quickbill.vercel.app?utm_source=google&utm_medium=cpc&utm_campaign=quickbill-search-v1&utm_content=sitelink_anchor_pricing#pricing"

# --- Budget & Bidding ---
budget:
  daily_budget_cents: 1500          # $15/day
  total_budget_cents: 10000         # $100 total cap (max 50000 without override)
  duration_days: 5                  # experiment duration
  bidding_strategy: manual_cpc    # Phase 1; see google-ads.md Phase 1 Playbook for progression

# --- Targeting ---
targeting:
  locations:
    - US
  languages:
    - en
  # No demographic or audience targeting initially — let Google optimize

# --- Conversion Tracking ---
# Phase 3 conversion-action reference only. Phase 1/2 Manual CPC screens
# measure through PostHog/DB plus Google Ads clicks and do not import conversions.
conversions:
  primary_action: signup_complete   # experiment/EVENTS.yaml event to optimize for
  secondary_actions:
    - activate                      # activation funnel step
  import_method: posthog_webhook    # PostHog -> Google Ads Offline Conversions

# --- Guardrails ---
guardrails:
  max_cpc_cents: 500                # never bid more than $5/click
  min_daily_clicks: 3               # alert if fewer than 3 clicks/day after day 2
  auto_pause_rules:
    - condition: total_spend >= total_budget_cents
      action: pause_campaign
    - condition: days_elapsed >= duration_days
      action: pause_campaign
    - condition: ctr < 0.01 AND impressions > 500
      action: alert_low_ctr
    - condition: cost_per_conversion_cents > 2000 AND conversions >= 5
      action: alert_high_cpa

